<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustCycle-TC | MasterZ*IOTA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: black url('background.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            z-index: 10;
        }

        .sponsors-logos {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .sponsor-logo {
            height: 30px;
            width: auto;
            filter: brightness(0) invert(1); 
            opacity: 0.9;
        }

        .hero {
            text-align: center;
            max-width: 900px;
            padding: 40px 20px;
            z-index: 1;
        }

        .event-tag {
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
            color: #d1d5db;
        }

        h1 {
            font-size: clamp(2rem, 7vw, 4rem);
            margin: 0;
            font-weight: 800;
            line-height: 1.1;
        }

        .project-title {
            display: block;
            margin-top: 10px;
            background: linear-gradient(90deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.4rem;
            margin: 30px 0 10px;
            font-weight: 400;
        }

        .features {
            font-size: 1rem;
            color: #9ca3af;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .cta-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 60px;
        }

        .btn {
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: inline-block;
            text-align: center;
        }

        .btn-live {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .btn-live:hover {
            transform: scale(1.05);
            background: #f3f4f6;
        }

        .btn-video {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-video:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .preview-container {
            width: 90%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px 30px 0 0;
            padding: 15px 15px 0 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 -20px 50px rgba(0,0,0,0.5);
        }

        .preview-container img {
            width: 100%;
            border-radius: 20px 20px 0 0;
            display: block;
            filter: brightness(0.9);
        }

        @media (max-width: 600px) {
            header { 
                flex-direction: column; 
                gap: 15px; 
                text-align: center; 
                padding: 20px;
            }
            .sponsors-logos { justify-content: center; }
            
            .cta-group { 
                flex-direction: column; 
                width: 100%; 
                padding: 0 20px; 
            }
            .btn { 
                width: 100%; 
            }
            
            h1 { font-size: 2.2rem; }
            .tagline { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="sponsors-logos">
            <img src="logo-iota.png" alt="IOTA Logo" class="sponsor-logo">
            <img src="logo-masterz.png" alt="MasterZ Logo" class="sponsor-logo">
        </div>
        <div>A work from: <strong>Saba Azadegan</strong></div>
    </header>

    <main class="hero">
        <span class="event-tag">First Web3 European Hackathon (Feb–Mar 2026)</span>
        <h1>MasterZ*IOTA Hackathon<br>
            <span class="project-title">TrustCycle-TC</span>
        </h1>

        <p class="tagline">Imagine your Professional Letters submitted on-chain.</p>
        <p class="features">
            With TC: Decentralized, Verifiable, Portable, Revokable Endorsements<br>
            <strong>Free for Students and Professors.</strong>
        </p>

        <div class="cta-group">
            <a href="https://trust-cycle-drs.vercel.app" target="_blank" class="btn btn-live">Live Demo</a>
            <a href="https://youtu.be/OXa0zkTi3Vs?si=xtSI-5XA3bMFsX8r" target="_blank" class="btn btn-video">Demo Walkthrough</a>
        </div>
    </main>

    <section class="preview-container">
        <img src="preview.png" alt="TrustCycle UI Preview">
    </section>

</body>
</html>
